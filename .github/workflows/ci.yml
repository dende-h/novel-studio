name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 最小権限（読み取りのみ）
permissions:
  contents: read

# 同一ブランチの古い実行はキャンセルして無駄なくする
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint・型チェック・テスト・ビルド
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: pnpm セットアップ
        uses: pnpm/action-setup@v4

      - name: Node セットアップ
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: 依存関係をインストール
        run: pnpm install --frozen-lockfile

      - name: Lint（Biome）
        # --reporter=github で各診断を GitHub のアノテーション（PR の inline 注釈）として出力
        run: pnpm exec biome ci . --reporter=github

      - name: 型チェック
        run: pnpm typecheck

      - name: ユニットテスト（Vitest）
        run: pnpm test

      - name: 本番ビルド
        run: pnpm build

  e2e:
    name: E2E（Playwright）
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: pnpm セットアップ
        uses: pnpm/action-setup@v4

      - name: Node セットアップ
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: 依存関係をインストール
        run: pnpm install --frozen-lockfile

      - name: Playwright ブラウザをインストール
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E テスト
        run: pnpm test:e2e

      - name: レポートをアップロード（失敗時の調査用）
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

name: CI

on:
  push:
    branches: [main, stg]
  pull_request:
    branches: [main, stg]

# 最小権限（読み取りのみ）
permissions:
  contents: read

# 同一ブランチの古い実行はキャンセルして無駄なくする
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint・型チェック・テスト・ビルド
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト
        uses: actions/checkout@v6

      - name: mise セットアップ（node/pnpm）
        uses: jdx/mise-action@v4

      - name: pnpm ストアのパスを取得
        run: echo "PNPM_STORE=$(mise exec -- pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: pnpm ストアのキャッシュ
        uses: actions/cache@v5
        with:
          path: ${{ env.PNPM_STORE }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: 依存関係をインストール
        run: mise exec -- pnpm install --frozen-lockfile

      - name: Lint（Biome）
        # --reporter=github で各診断を GitHub のアノテーション（PR の inline 注釈）として出力
        run: mise exec -- pnpm exec biome ci . --reporter=github

      - name: 型チェック
        run: mise exec -- pnpm typecheck

      - name: ユニットテスト（Vitest）
        run: mise exec -- pnpm test

      - name: 本番ビルド
        run: mise exec -- pnpm build

  e2e:
    name: E2E（Playwright）
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト
        uses: actions/checkout@v6

      - name: mise セットアップ（node/pnpm）
        uses: jdx/mise-action@v4

      - name: pnpm ストアのパスを取得
        run: echo "PNPM_STORE=$(mise exec -- pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: pnpm ストアのキャッシュ
        uses: actions/cache@v5
        with:
          path: ${{ env.PNPM_STORE }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: 依存関係をインストール
        run: mise exec -- pnpm install --frozen-lockfile

      - name: Playwright ブラウザをインストール
        run: mise exec -- pnpm exec playwright install --with-deps chromium

      - name: E2E テスト
        run: mise exec -- pnpm test:e2e

      - name: レポートをアップロード（失敗時の調査用）
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

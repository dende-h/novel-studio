# Cloudflare Pages（Functions＋バインディング）の設定。
# 既存の GitHub Actions デプロイ（wrangler pages deploy dist）はこの設定を自動で読む。
# セットアップ手順は docs/requirement/05-sync-setup.md を参照。
name = "novel-studio"
pages_build_output_dir = "dist"
compatibility_date = "2024-11-01"
# @clerk/backend は Node 互換 API を使うため nodejs_compat を付ける。
compatibility_flags = ["nodejs_compat"]

# --- バインディング ---------------------------------------------------------
# `wrangler d1 create novel-studio`（2026-06-22 作成・APAC）の database_id。
# binding 名は Functions 側（functions/api/session/* の Env.DB）に合わせて DB。
[[d1_databases]]
binding = "DB"
database_name = "novel-studio"
database_id = "811bad99-8040-4c46-9192-26623aeabc99"

# 同期本体（Phase 2）の暗号化ブロブ置き場。`wrangler r2 bucket create novel-studio-media` 後に有効。
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "novel-studio-media"

# --- プレビュー（stg ブランチ）専用バインディング -----------------------------
# トップレベルは local＋本番(production)に適用される。stg は本番ブランチ(main)と
# 一致しないため Pages が自動で preview 環境として扱い、ここで D1・R2 を上書きする
# → 本番ユーザーデータと stg テストデータを物理的に分離する。
# 注意: D1・R2 は non-inheritable キー。preview を上書きするなら preview に「両方」必須
#       （片方だけだとデプロイ検証に落ちる）。
[[env.preview.d1_databases]]
binding = "DB"
database_name = "novel-studio-stg"
database_id = "b41dafd3-26fb-4e2e-823a-031a3398d4f5"

[[env.preview.r2_buckets]]
binding = "MEDIA"
bucket_name = "novel-studio-media-stg"
